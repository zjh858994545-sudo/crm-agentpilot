services:
  postgres:
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ${AGENTPILOT_DATA_DIR:-./data}/postgres:/var/lib/postgresql/data

  redis:
    restart: unless-stopped
    volumes:
      - ${AGENTPILOT_DATA_DIR:-./data}/redis:/data

  kafka:
    restart: unless-stopped
    volumes:
      - ${AGENTPILOT_DATA_DIR:-./data}/kafka:/tmp/kraft-combined-logs

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      kafka:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-local}
      BACKEND_PORT: 8080
      AGENTPILOT_APP_PHASE: production
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      AGENTPILOT_SECURITY_MODE: strict
      AGENTPILOT_SEED_USERS_ENABLED: "false"
      AGENTPILOT_RATE_LIMIT_ENABLED: "true"
      AGENTPILOT_RATE_LIMIT_BACKEND: redis
      AGENTPILOT_JWT_ENABLED: ${AGENTPILOT_JWT_ENABLED:-false}
      AGENTPILOT_JWT_ISSUER_URI: ${AGENTPILOT_JWT_ISSUER_URI:-}
      AGENTPILOT_JWT_AUDIENCE: ${AGENTPILOT_JWT_AUDIENCE:-crm-agentpilot}
      AGENTPILOT_JWT_ALLOWED_TENANTS: ${AGENTPILOT_JWT_ALLOWED_TENANTS:-}
      AGENT_EVENTS_KAFKA_ENABLED: ${AGENT_EVENTS_KAFKA_ENABLED:-true}
      AGENT_MODEL_PROVIDER: openai-compatible
      OPENAI_COMPATIBLE_BASE_URL: ${OPENAI_COMPATIBLE_BASE_URL}
      OPENAI_COMPATIBLE_API_KEY: ${OPENAI_COMPATIBLE_API_KEY}
      OPENAI_COMPATIBLE_CHAT_MODEL: ${OPENAI_COMPATIBLE_CHAT_MODEL}
      OPENAI_COMPATIBLE_TEMPERATURE: ${OPENAI_COMPATIBLE_TEMPERATURE:-0.2}
      AGENT_EMBEDDING_PROVIDER: openai-compatible
      OPENAI_COMPATIBLE_EMBEDDING_BASE_URL: ${OPENAI_COMPATIBLE_EMBEDDING_BASE_URL}
      OPENAI_COMPATIBLE_EMBEDDING_API_KEY: ${OPENAI_COMPATIBLE_EMBEDDING_API_KEY}
      OPENAI_COMPATIBLE_EMBEDDING_MODEL: ${OPENAI_COMPATIBLE_EMBEDDING_MODEL:-text-embedding-v4}
      OPENAI_COMPATIBLE_EMBEDDING_DIMENSIONS: ${OPENAI_COMPATIBLE_EMBEDDING_DIMENSIONS:-1024}
      AGENTPILOT_APP_BASE_URL: ${AGENTPILOT_APP_BASE_URL:-https://${AGENTPILOT_DOMAIN}}
      AGENTPILOT_NOTIFICATION_DELIVERY_CHANNEL: ${AGENTPILOT_NOTIFICATION_DELIVERY_CHANNEL:-generic}
      AGENTPILOT_NOTIFICATION_WEBHOOK_ENABLED: ${AGENTPILOT_NOTIFICATION_WEBHOOK_ENABLED:-false}
      AGENTPILOT_NOTIFICATION_WEBHOOK_URL: ${AGENTPILOT_NOTIFICATION_WEBHOOK_URL:-}
      AGENTPILOT_NOTIFICATION_WEBHOOK_TIMEOUT_SECONDS: ${AGENTPILOT_NOTIFICATION_WEBHOOK_TIMEOUT_SECONDS:-5}
      AGENTPILOT_CALLCENTER_WEBHOOK_SIGNATURE_ENABLED: ${AGENTPILOT_CALLCENTER_WEBHOOK_SIGNATURE_ENABLED:-true}
      AGENTPILOT_CALLCENTER_WEBHOOK_SECRET: ${AGENTPILOT_CALLCENTER_WEBHOOK_SECRET}
      AGENTPILOT_CALLCENTER_WEBHOOK_MAX_SKEW_SECONDS: ${AGENTPILOT_CALLCENTER_WEBHOOK_MAX_SKEW_SECONDS:-300}
      AGENTPILOT_CALLCENTER_PROVIDER: ${AGENTPILOT_CALLCENTER_PROVIDER:-manual}
      AGENTPILOT_CALLCENTER_PROVIDER_ENABLED: ${AGENTPILOT_CALLCENTER_PROVIDER_ENABLED:-false}
      AGENTPILOT_CALLCENTER_PROVIDER_ENDPOINT: ${AGENTPILOT_CALLCENTER_PROVIDER_ENDPOINT:-}
      AGENTPILOT_ASR_PROVIDER: ${AGENTPILOT_ASR_PROVIDER:-manual}
      AGENTPILOT_ASR_MODEL: ${AGENTPILOT_ASR_MODEL:-}
      AGENTPILOT_ASR_ENABLED: ${AGENTPILOT_ASR_ENABLED:-false}
      AGENTPILOT_RETENTION_ENABLED: ${AGENTPILOT_RETENTION_ENABLED:-true}
      AGENTPILOT_RETENTION_SCHEDULED_CLEANUP_ENABLED: ${AGENTPILOT_RETENTION_SCHEDULED_CLEANUP_ENABLED:-true}
      AGENTPILOT_RETENTION_EXPORT_ARTIFACT_DAYS: ${AGENTPILOT_RETENTION_EXPORT_ARTIFACT_DAYS:-3}
      BACKEND_JAVA_TOOL_OPTIONS: ${BACKEND_JAVA_TOOL_OPTIONS:-}

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/generated:/etc/nginx/conf.d:ro
      - ${AGENTPILOT_CERTBOT_DIR:-./data/certbot}/www:/var/www/certbot:ro
      - ${AGENTPILOT_CERTBOT_DIR:-./data/certbot}/conf:/etc/letsencrypt:ro
