logging:
  level:
    root: INFO
    com.agentpilot: DEBUG

spring:
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:agentpilot}
    username: ${POSTGRES_USER:agentpilot}
    password: ${POSTGRES_PASSWORD:agentpilot}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
