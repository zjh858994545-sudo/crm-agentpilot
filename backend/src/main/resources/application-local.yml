logging:
  level:
    root: INFO
    com.agentpilot: ${AGENTPILOT_LOG_LEVEL:INFO}
    com.agentpilot.agent.mapper: ${AGENTPILOT_SQL_LOG_LEVEL:WARN}
    com.agentpilot.crm.mapper: ${AGENTPILOT_SQL_LOG_LEVEL:WARN}
    com.agentpilot.rag.mapper: ${AGENTPILOT_SQL_LOG_LEVEL:WARN}
    com.agentpilot.events.mapper: ${AGENTPILOT_SQL_LOG_LEVEL:WARN}

spring:
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:agentpilot}
    username: ${POSTGRES_USER:agentpilot}
    password: ${POSTGRES_PASSWORD:agentpilot}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration,classpath:db/vendor/{vendor}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
