server:
  port: ${BACKEND_PORT:8080}

spring:
  application:
    name: crm-agentpilot
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  jackson:
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null
  flyway:
    locations: classpath:db/migration,classpath:db/vendor/{vendor}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

management:
  health:
    diskspace:
      enabled: false
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  pattern:
    level: "%5p [traceId:%X{traceId:-}]"

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    banner: false

agentpilot:
  app:
    name: CRM-AgentPilot
    version: 0.1.0
    phase: ${AGENTPILOT_APP_PHASE:ready}
    model-provider: ${AGENT_MODEL_PROVIDER:mock}
  model:
    provider: ${AGENT_MODEL_PROVIDER:mock}
    openai-compatible:
      base-url: ${OPENAI_COMPATIBLE_BASE_URL:}
      api-key: ${OPENAI_COMPATIBLE_API_KEY:}
      chat-model: ${OPENAI_COMPATIBLE_CHAT_MODEL:gpt-4o-mini}
      temperature: ${OPENAI_COMPATIBLE_TEMPERATURE:0.2}
    embedding:
      provider: ${AGENT_EMBEDDING_PROVIDER:${AGENT_MODEL_PROVIDER:mock}}
      openai-compatible:
        base-url: ${OPENAI_COMPATIBLE_EMBEDDING_BASE_URL:${OPENAI_COMPATIBLE_BASE_URL:}}
        api-key: ${OPENAI_COMPATIBLE_EMBEDDING_API_KEY:${OPENAI_COMPATIBLE_API_KEY:}}
        embedding-model: ${OPENAI_COMPATIBLE_EMBEDDING_MODEL:text-embedding-v4}
        dimensions: ${OPENAI_COMPATIBLE_EMBEDDING_DIMENSIONS:1024}
  events:
    kafka-enabled: ${AGENT_EVENTS_KAFKA_ENABLED:false}
    agent-run-topic: ${AGENT_RUN_EVENTS_TOPIC:agent-run-events}
    agent-tool-call-topic: ${AGENT_TOOL_CALL_EVENTS_TOPIC:agent-tool-call-events}
    crm-task-topic: ${CRM_TASK_EVENTS_TOPIC:crm-task-events}
    outbox-dispatch-delay-ms: ${AGENT_OUTBOX_DISPATCH_DELAY_MS:5000}
  security:
    mode: ${AGENTPILOT_SECURITY_MODE:permissive}
    api-token: ${AGENTPILOT_API_TOKEN:}
    demo-user-id: ${AGENTPILOT_DEMO_USER_ID:1}
    demo-sales-rep-id: ${AGENTPILOT_DEMO_SALES_REP_ID:1}
    seed-users-enabled: ${AGENTPILOT_SEED_USERS_ENABLED:true}
    token-audit-min-interval-seconds: ${AGENTPILOT_TOKEN_AUDIT_MIN_INTERVAL_SECONDS:60}
  rate-limit:
    enabled: ${AGENTPILOT_RATE_LIMIT_ENABLED:true}
    backend: ${AGENTPILOT_RATE_LIMIT_BACKEND:auto}
    default-capacity: ${AGENTPILOT_RATE_LIMIT_DEFAULT_CAPACITY:300}
    default-refill-per-minute: ${AGENTPILOT_RATE_LIMIT_DEFAULT_REFILL_PER_MINUTE:300}
    agent-capacity: ${AGENTPILOT_RATE_LIMIT_AGENT_CAPACITY:60}
    agent-refill-per-minute: ${AGENTPILOT_RATE_LIMIT_AGENT_REFILL_PER_MINUTE:60}
    model-capacity: ${AGENTPILOT_RATE_LIMIT_MODEL_CAPACITY:30}
    model-refill-per-minute: ${AGENTPILOT_RATE_LIMIT_MODEL_REFILL_PER_MINUTE:30}
  retention:
    enabled: ${AGENTPILOT_RETENTION_ENABLED:false}
    scheduled-cleanup-enabled: ${AGENTPILOT_RETENTION_SCHEDULED_CLEANUP_ENABLED:false}
    cleanup-cron: ${AGENTPILOT_RETENTION_CLEANUP_CRON:0 30 3 * * *}
    agent-audit-days: ${AGENTPILOT_RETENTION_AGENT_AUDIT_DAYS:180}
    retrieval-log-days: ${AGENTPILOT_RETENTION_RETRIEVAL_LOG_DAYS:90}
    outbox-published-days: ${AGENTPILOT_RETENTION_OUTBOX_PUBLISHED_DAYS:30}
    max-delete-rows-per-run: ${AGENTPILOT_RETENTION_MAX_DELETE_ROWS_PER_RUN:10000}
