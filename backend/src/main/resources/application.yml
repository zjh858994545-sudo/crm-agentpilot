server:
  port: ${BACKEND_PORT:8080}

spring:
  application:
    name: crm-agentpilot
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  jackson:
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  pattern:
    level: "%5p [traceId:%X{traceId:-}]"

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    banner: false

agentpilot:
  app:
    name: CRM-AgentPilot
    version: 0.1.0
    phase: demo-ready
    model-provider: ${AGENT_MODEL_PROVIDER:mock}
  model:
    provider: ${AGENT_MODEL_PROVIDER:mock}
    openai-compatible:
      base-url: ${OPENAI_COMPATIBLE_BASE_URL:}
      api-key: ${OPENAI_COMPATIBLE_API_KEY:}
      chat-model: ${OPENAI_COMPATIBLE_CHAT_MODEL:gpt-4o-mini}
      temperature: ${OPENAI_COMPATIBLE_TEMPERATURE:0.2}
