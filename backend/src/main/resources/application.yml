server:
  port: ${BACKEND_PORT:8080}

spring:
  application:
    name: crm-agentpilot
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  jackson:
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

management:
  health:
    diskspace:
      enabled: false
  endpoints:
    web:
      exposure:
        include: health,info,metrics

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  pattern:
    level: "%5p [traceId:%X{traceId:-}]"

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    banner: false

agentpilot:
  app:
    name: CRM-AgentPilot
    version: 0.1.0
    phase: demo-ready
    model-provider: ${AGENT_MODEL_PROVIDER:mock}
  model:
    provider: ${AGENT_MODEL_PROVIDER:mock}
    openai-compatible:
      base-url: ${OPENAI_COMPATIBLE_BASE_URL:}
      api-key: ${OPENAI_COMPATIBLE_API_KEY:}
      chat-model: ${OPENAI_COMPATIBLE_CHAT_MODEL:gpt-4o-mini}
      temperature: ${OPENAI_COMPATIBLE_TEMPERATURE:0.2}
  events:
    kafka-enabled: ${AGENT_EVENTS_KAFKA_ENABLED:false}
    agent-run-topic: ${AGENT_RUN_EVENTS_TOPIC:agent-run-events}
    agent-tool-call-topic: ${AGENT_TOOL_CALL_EVENTS_TOPIC:agent-tool-call-events}
    crm-task-topic: ${CRM_TASK_EVENTS_TOPIC:crm-task-events}
