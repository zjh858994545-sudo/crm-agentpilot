name: CI

on:
  push:
    branches: ["main", "master", "codex/**"]
  pull_request:

jobs:
  hygiene:
    name: Repository Hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Docker Compose config
        run: docker compose -f docker-compose.yml -f docker-compose.full.yml --env-file .env.example config --quiet
      - name: Check accidental API keys
        run: |
          if git grep -n -E 'sk-[A-Za-z0-9_-]{20,}|OPENAI_COMPATIBLE_API_KEY=sk-|OPENAI_COMPATIBLE_EMBEDDING_API_KEY=sk-' -- . ':(exclude).github/workflows/ci.yml'; then
            echo "Potential API key found in tracked files."
            exit 1
          fi

  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Run tests
        run: mvn -B test

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build

  e2e:
    name: Frontend E2E Smoke
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Start backend with H2 profile
        run: |
          nohup mvn -B -f backend/pom.xml spring-boot:run \
            -Dspring-boot.run.profiles=test \
            -Dspring-boot.run.arguments=--server.port=18080 \
            > backend-e2e.log 2>&1 &
          echo $! > backend-e2e.pid
          for i in {1..90}; do
            if curl -sf http://127.0.0.1:18080/api/health > /dev/null; then
              echo "Backend is ready"
              exit 0
            fi
            sleep 2
          done
          cat backend-e2e.log
          exit 1
      - name: Run Playwright smoke flow
        working-directory: frontend
        env:
          VITE_BACKEND_URL: http://127.0.0.1:18080
        run: npm run test:e2e
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
      - name: Upload backend log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-e2e-log
          path: backend-e2e.log
