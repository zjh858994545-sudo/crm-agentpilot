services:
  backend:
    build:
      context: ./backend
    container_name: agentpilot-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      kafka:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: local
      BACKEND_PORT: 8080
      AGENTPILOT_APP_PHASE: ${AGENTPILOT_APP_PHASE:-ready}
      AGENTPILOT_LOG_LEVEL: ${AGENTPILOT_LOG_LEVEL:-INFO}
      AGENTPILOT_SQL_LOG_LEVEL: ${AGENTPILOT_SQL_LOG_LEVEL:-WARN}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-agentpilot}
      POSTGRES_USER: ${POSTGRES_USER:-agentpilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agentpilot}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      AGENTPILOT_SECURITY_MODE: ${AGENTPILOT_SECURITY_MODE:-permissive}
      AGENTPILOT_API_TOKEN: ${AGENTPILOT_API_TOKEN:-}
      AGENTPILOT_DEMO_TENANT_ID: ${AGENTPILOT_DEMO_TENANT_ID:-demo}
      AGENTPILOT_DEMO_USER_ID: ${AGENTPILOT_DEMO_USER_ID:-1}
      AGENTPILOT_DEMO_SALES_REP_ID: ${AGENTPILOT_DEMO_SALES_REP_ID:-1}
      AGENTPILOT_JWT_ENABLED: ${AGENTPILOT_JWT_ENABLED:-false}
      AGENTPILOT_JWT_ISSUER_URI: ${AGENTPILOT_JWT_ISSUER_URI:-}
      AGENTPILOT_JWT_AUDIENCE: ${AGENTPILOT_JWT_AUDIENCE:-crm-agentpilot}
      AGENTPILOT_JWT_TENANT_CLAIM: ${AGENTPILOT_JWT_TENANT_CLAIM:-tenant_id}
      AGENTPILOT_JWT_SALES_REP_CLAIM: ${AGENTPILOT_JWT_SALES_REP_CLAIM:-sales_rep_id}
      AGENTPILOT_SEED_USERS_ENABLED: ${AGENTPILOT_SEED_USERS_ENABLED:-true}
      AGENTPILOT_TOKEN_AUDIT_MIN_INTERVAL_SECONDS: ${AGENTPILOT_TOKEN_AUDIT_MIN_INTERVAL_SECONDS:-60}
      AGENTPILOT_RATE_LIMIT_ENABLED: ${AGENTPILOT_RATE_LIMIT_ENABLED:-true}
      AGENTPILOT_RATE_LIMIT_BACKEND: ${AGENTPILOT_RATE_LIMIT_BACKEND:-auto}
      AGENTPILOT_RATE_LIMIT_DEFAULT_CAPACITY: ${AGENTPILOT_RATE_LIMIT_DEFAULT_CAPACITY:-300}
      AGENTPILOT_RATE_LIMIT_DEFAULT_REFILL_PER_MINUTE: ${AGENTPILOT_RATE_LIMIT_DEFAULT_REFILL_PER_MINUTE:-300}
      AGENTPILOT_RATE_LIMIT_AGENT_CAPACITY: ${AGENTPILOT_RATE_LIMIT_AGENT_CAPACITY:-60}
      AGENTPILOT_RATE_LIMIT_AGENT_REFILL_PER_MINUTE: ${AGENTPILOT_RATE_LIMIT_AGENT_REFILL_PER_MINUTE:-60}
      AGENTPILOT_RATE_LIMIT_MODEL_CAPACITY: ${AGENTPILOT_RATE_LIMIT_MODEL_CAPACITY:-30}
      AGENTPILOT_RATE_LIMIT_MODEL_REFILL_PER_MINUTE: ${AGENTPILOT_RATE_LIMIT_MODEL_REFILL_PER_MINUTE:-30}
      AGENTPILOT_RETENTION_ENABLED: ${AGENTPILOT_RETENTION_ENABLED:-false}
      AGENTPILOT_RETENTION_SCHEDULED_CLEANUP_ENABLED: ${AGENTPILOT_RETENTION_SCHEDULED_CLEANUP_ENABLED:-false}
      AGENTPILOT_RETENTION_CLEANUP_CRON: ${AGENTPILOT_RETENTION_CLEANUP_CRON:-0 30 3 * * *}
      AGENTPILOT_RETENTION_AGENT_AUDIT_DAYS: ${AGENTPILOT_RETENTION_AGENT_AUDIT_DAYS:-180}
      AGENTPILOT_RETENTION_RETRIEVAL_LOG_DAYS: ${AGENTPILOT_RETENTION_RETRIEVAL_LOG_DAYS:-90}
      AGENTPILOT_RETENTION_OUTBOX_PUBLISHED_DAYS: ${AGENTPILOT_RETENTION_OUTBOX_PUBLISHED_DAYS:-30}
      AGENTPILOT_RETENTION_MAX_DELETE_ROWS_PER_RUN: ${AGENTPILOT_RETENTION_MAX_DELETE_ROWS_PER_RUN:-10000}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      AGENT_EVENTS_KAFKA_ENABLED: ${AGENT_EVENTS_KAFKA_ENABLED:-false}
      AGENT_MODEL_PROVIDER: ${AGENT_MODEL_PROVIDER:-mock}
      OPENAI_COMPATIBLE_BASE_URL: ${OPENAI_COMPATIBLE_BASE_URL:-}
      OPENAI_COMPATIBLE_API_KEY: ${OPENAI_COMPATIBLE_API_KEY:-}
      OPENAI_COMPATIBLE_CHAT_MODEL: ${OPENAI_COMPATIBLE_CHAT_MODEL:-gpt-4o-mini}
      OPENAI_COMPATIBLE_TEMPERATURE: ${OPENAI_COMPATIBLE_TEMPERATURE:-0.2}
      AGENT_EMBEDDING_PROVIDER: ${AGENT_EMBEDDING_PROVIDER:-${AGENT_MODEL_PROVIDER:-mock}}
      OPENAI_COMPATIBLE_EMBEDDING_BASE_URL: ${OPENAI_COMPATIBLE_EMBEDDING_BASE_URL:-${OPENAI_COMPATIBLE_BASE_URL:-}}
      OPENAI_COMPATIBLE_EMBEDDING_API_KEY: ${OPENAI_COMPATIBLE_EMBEDDING_API_KEY:-${OPENAI_COMPATIBLE_API_KEY:-}}
      OPENAI_COMPATIBLE_EMBEDDING_MODEL: ${OPENAI_COMPATIBLE_EMBEDDING_MODEL:-text-embedding-v4}
      OPENAI_COMPATIBLE_EMBEDDING_DIMENSIONS: ${OPENAI_COMPATIBLE_EMBEDDING_DIMENSIONS:-1024}
      JAVA_TOOL_OPTIONS: ${BACKEND_JAVA_TOOL_OPTIONS:-}
    ports:
      - "${BACKEND_PORT:-18080}:8080"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: agentpilot-frontend
    depends_on:
      backend:
        condition: service_started
    ports:
      - "${FRONTEND_PORT:-15173}:80"
    restart: unless-stopped
