groups:
  - name: crm-agentpilot
    rules:
      - alert: AgentPilotBackendDown
        expr: up{job=~".*agentpilot.*"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "CRM-AgentPilot backend is down"
          description: "Prometheus cannot scrape the AgentPilot backend. Check application process, container status, and network path."

      - alert: AgentPilotApi5xxSpike
        expr: sum(rate(http_server_requests_seconds_count{uri=~"/api/.*",status=~"5.."}[5m])) > 0.1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "CRM-AgentPilot API 5xx errors are increasing"
          description: "Backend API is returning server errors. Check logs by X-Trace-Id, recent deployment, database, model provider, and Kafka/outbox state."

      - alert: AgentPilotAuthFailureSpike
        expr: sum(rate(http_server_requests_seconds_count{uri=~"/api/.*",status=~"401|403"}[5m])) > 0.5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "CRM-AgentPilot authentication or authorization failures are high"
          description: "401/403 rate is unusually high. Check token rotation, JWT issuer, tenant allow-list, RBAC permissions, and possible abuse."

      - alert: AgentPilotRateLimitSpike
        expr: sum(rate(http_server_requests_seconds_count{uri=~"/api/.*",status="429"}[5m])) > 0.2
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "CRM-AgentPilot rate limit is frequently triggered"
          description: "429 responses are above threshold. Check whether traffic is expected, Redis rate-limit backend is healthy, and model cost protection is working."

      - alert: AgentPilotWebhookReplayOrSignatureRejections
        expr: sum(rate(agentpilot_webhook_rejected_total{endpoint="call-ended-events"}[5m])) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "CRM-AgentPilot call-center webhook rejections are increasing"
          description: "Inbound call-ended events are being rejected by timestamp, nonce replay, or signature validation. Check provider clock skew, shared secret rotation, and possible replay attempts."

      - alert: AgentPilotNotificationWebhookFailures
        expr: sum(rate(agentpilot_notification_webhook_delivery_total{result="failed"}[5m])) > 0.05
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "CRM-AgentPilot notification webhook delivery is failing"
          description: "Confirmation reminders cannot be pushed to the external gateway. Check WeCom/DingTalk/SMS gateway availability, webhook URL, and network egress."

      - alert: AgentPilotOutboxDeadLetters
        expr: agentpilot_outbox_dead_letter_events > 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "CRM-AgentPilot has dead-letter outbox events"
          description: "At least one outbox event exceeded retry limits. Open System Admin -> Outbox dead letters and retry after checking downstream systems."

      - alert: AgentPilotOutboxBacklog
        expr: agentpilot_outbox_pending_events > 100
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "CRM-AgentPilot outbox backlog is growing"
          description: "More than 100 outbox events are pending for over 10 minutes. Check Kafka/log-only dispatcher and downstream availability."

      - alert: AgentPilotRetentionBacklog
        expr: agentpilot_retention_eligible_rows > 10000
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "CRM-AgentPilot retention backlog exceeds one cleanup window"
          description: "Rows eligible for retention cleanup exceed the default single-run limit. Verify backups, run dry-run, then clean in batches."

      - alert: AgentPilotKnowledgeVectorCoverageLow
        expr: |
          agentpilot_knowledge_chunks_total > 0
          and agentpilot_knowledge_vectorized_chunks / agentpilot_knowledge_chunks_total < 0.8
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "CRM-AgentPilot knowledge vector coverage is low"
          description: "Less than 80% of knowledge chunks have pgvector embeddings. Rebuild vectors from System Admin."
